<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ToolDelta Web</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-page {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: var(--canvas);
            position: relative;
        }
        .auth-wallpaper-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover; background-position: center; z-index: 0;
        }
        .auth-wallpaper-bg::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(1,1,2,0.55);
        }
        .auth-card { position: relative; z-index: 1; }
        .auth-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 40px; width: 100%; max-width: 380px;
        }
        .auth-card h1 {
            font-size: 22px; font-weight: 600; margin-bottom: 4px; text-align: center;
        }
        .auth-card p.sub {
            font-size: 13px; color: var(--ink-muted); text-align: center; margin-bottom: 28px;
        }
        .auth-card .logo-big {
            display: block; width: 56px; height: 56px; margin: 0 auto 16px;
            background: var(--accent); border-radius: 14px;
            line-height: 56px; text-align: center;
            font-size: 24px; font-weight: 700; color: #fff;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--ink); }
        .form-group input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--canvas); color: var(--ink); font-size: 14px; outline: none; box-sizing: border-box; }
        .form-group input:focus { border-color: var(--accent); }
        .auth-card .btn { width: 100%; padding: 10px; font-size: 15px; margin-top: 4px; }
    </style>
</head>
<body class="auth-page">
    {% if wallpaper_url %}<div class="auth-wallpaper-bg" style="background-image:url('{{ wallpaper_url }}')"></div>{% endif %}
    <div class="auth-card">
        <span class="logo-big">TD</span>
        <h1>登录</h1>
        <p class="sub">ToolDelta Web 管理面板</p>
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">登录</button>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script>
        function showToast(msg, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            container.appendChild(t);
            setTimeout(function() { t.remove(); }, 3000);
        }
        function doLogin() {
            var u = document.getElementById('username').value.trim();
            var p = document.getElementById('password').value;
            if (!u || !p) { showToast('请输入用户名和密码', 'error'); return; }
            fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) })
            .then(function(r){return r.json()})
            .then(function(d){
                if(d.success){ showToast('登录成功', 'success'); setTimeout(function(){ window.location.href='/'; }, 500); }
                else { showToast(d.error||'登录失败', 'error'); }
            })
            .catch(function(){ showToast('请求失败', 'error'); });
        }
        document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    </script>
</body>
</html>
