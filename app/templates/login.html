<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ToolDelta Web</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-page {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: var(--canvas);
            position: relative; padding: 20px;
        }
        .auth-card {
            position: relative; z-index: 1;
            background: var(--glass-bg, rgba(20, 21, 22, 0.55));
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid var(--glass-brd, rgba(255,255,255,0.08));
            border-radius: 20px; padding: 44px 40px; width: 100%; max-width: 390px;
            box-shadow: var(--shadow-lg, 0 24px 70px rgba(0,0,0,0.50));
            animation: authPop 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }
        @keyframes authPop { from { transform: translateY(16px) scale(0.96); opacity: 0; } to { transform: none; opacity: 1; } }
        .auth-card .logo-big {
            display: block; width: 60px; height: 60px; margin: 0 auto 18px;
            background: var(--grad-primary, linear-gradient(135deg, #5e6ad2, #828fff 55%, #a78bfa));
            border-radius: 16px; line-height: 60px; text-align: center;
            font-size: 26px; font-weight: 700; color: #fff;
            box-shadow: 0 8px 26px rgba(94, 106, 210, 0.45);
            animation: logoFloat 3s ease-in-out infinite;
        }
        @keyframes logoFloat { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-4px); } }
        .auth-card h1 { font-size: 23px; font-weight: 600; margin-bottom: 4px; text-align: center; letter-spacing: -0.4px; }
        .auth-card p.sub { font-size: 13px; color: var(--ink-muted); text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--ink); }
        .form-group .input-wrap { position: relative; }
        .form-group .input-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.5; pointer-events: none; }
        .form-group input { width: 100%; padding: 11px 12px 11px 38px; border-radius: 10px; border: 1px solid var(--border, var(--hairline)); background: rgba(0,0,0,0.25); color: var(--ink); font-size: 14px; outline: none; box-sizing: border-box; transition: border-color .18s, box-shadow .18s; }
        .form-group input:focus { border-color: var(--accent, var(--primary)); box-shadow: 0 0 0 3px rgba(94, 106, 210, 0.25); }
        @media (max-width: 768px) {
            .form-group input { font-size: 16px; }
            .auth-card { padding: 32px 24px; max-width: 100%; }
        }
        .auth-card .btn { width: 100%; padding: 12px; font-size: 15px; margin-top: 6px; }
        .auth-card .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 14px; opacity: 0.5; user-select: none; transition: opacity .15s; }
        .auth-card .pw-toggle:hover { opacity: 1; }
    </style>
</head>
<body class="auth-page">
    <script src="/static/js/wallpaper.js"></script>
    {% if wallpaper_url %}<div class="wallpaper-bg" style="background-image:url('{{ wallpaper_url }}')"></div>{% endif %}
    <div class="auth-card">
        <span class="logo-big">TD</span>
        <h1>登录</h1>
        <p class="sub">ToolDelta Web 管理面板</p>
        <div class="form-group">
            <label for="username">用户名</label>
            <div class="input-wrap">
                <span class="input-ico">👤</span>
                <input type="text" id="username" placeholder="输入用户名" autocomplete="username">
            </div>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <div class="input-wrap">
                <span class="input-ico">🔒</span>
                <input type="password" id="password" placeholder="输入密码" autocomplete="current-password" enterkeyhint="go" name="password">
                <span class="pw-toggle" role="button" tabindex="0" aria-label="显示或隐藏密码" onclick="var i=document.getElementById('password');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'" onkeydown="if(event.key==='Enter'||event.key===' '||event.keyCode===13||event.keyCode===32){event.preventDefault();this.click();}">👁</span>
            </div>
        </div>
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登录</button>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script>
        function showToast(msg, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            container.appendChild(t);
            setTimeout(function() { t.remove(); }, 3000);
        }
        function doLogin() {
            var u = document.getElementById('username').value.trim();
            var p = document.getElementById('password').value;
            if (!u || !p) { showToast('请输入用户名和密码', 'error'); return; }
            var btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = '登录中...';
            fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) })
            .then(function(r){return r.json()})
            .then(function(d){
                btn.disabled = false; btn.textContent = '登录';
                if(d.success){ showToast('登录成功', 'success'); setTimeout(function(){ window.location.href='/'; }, 500); }
                else { showToast(d.error||'登录失败', 'error'); }
            })
            .catch(function(){ btn.disabled = false; btn.textContent = '登录'; showToast('请求失败', 'error'); });
        }
        document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
        document.getElementById('username').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('password').focus(); });
    </script>
</body>
</html>
