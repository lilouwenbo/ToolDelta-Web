{% extends "base.html" %}
{% set active_page = "connections" %}
{% block content %}

<div class="page-header">
    <h1>服务器连接</h1>
    <div>
        <button class="btn btn-primary" onclick="openForm()">添加连接</button>
    </div>
</div>

<div class="card">
    <div class="table-wrap">
        <table class="table">
            <thead>
                <tr>
                    <th>名称</th>
                    <th>地址</th>
                    <th>协议</th>
                    <th>默认</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="connTableBody">
            </tbody>
        </table>
    </div>
    <div id="connEmpty" class="empty-state" style="display:none">
        <div class="icon" aria-hidden="true">🌐</div>暂无连接，点击右上角「添加连接」创建。
    </div>
</div>

<!-- 添加 / 编辑 表单弹窗 -->
<div class="modal-overlay" id="connModal" role="dialog" aria-modal="true" aria-labelledby="connModalTitle">
    <div class="modal modal-md">
        <h2 id="connModalTitle">添加连接</h2>
        <input type="hidden" id="connId">
        <div class="form-group">
            <label for="connName">名称</label>
            <input type="text" id="connName" class="form-control" placeholder="例如：本地服务器" inputmode="text" enterkeyhint="next" name="conn-name" autocomplete="off">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="connHost">地址 (host)</label>
                <input type="text" id="connHost" class="form-control" placeholder="例如：127.0.0.1" inputmode="text" enterkeyhint="next" name="conn-host" autocomplete="off">
            </div>
            <div class="form-group form-group--narrow">
                <label for="connPort">端口 (port)</label>
                <input type="number" id="connPort" class="form-control" placeholder="8080" inputmode="numeric" enterkeyhint="next" name="conn-port" autocomplete="off">
            </div>
        </div>
        <div class="form-group">
            <label for="connProtocol">协议</label>
            <select id="connProtocol" class="form-control">
                <option value="tcp">tcp</option>
                <option value="ws">ws</option>
            </select>
        </div>
        <div class="form-group">
            <label for="connToken">Token（可选）</label>
            <input type="text" id="connToken" class="form-control" placeholder="可选" inputmode="text" enterkeyhint="next" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="connNote">备注（可选）</label>
            <textarea id="connNote" class="form-control" rows="2" placeholder="可选" enterkeyhint="done"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeForm()">取消</button>
            <button class="btn btn-primary" onclick="submitForm()">保存</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/connections.js"></script>
{% endblock %}
