{% extends "base.html" %}
{% set active_page = "watchdog" %}
{% block content %}
<div class="page-header">
    <h1>看门狗</h1>
    <div>
        <button class="btn btn-primary" onclick="enableWatchdog()">启用</button>
        <button class="btn btn-outline" onclick="disableWatchdog()">禁用</button>
    </div>
</div>

<div class="card" style="margin-bottom:20px">
    <h3>监控配置</h3>
    <p class="help-text">
        看门狗会定期检查 ToolDelta 主进程是否存活，进程停止/崩溃时按下面的策略自动重启。
    </p>

    <div class="form-group">
        <label class="check-label" for="cfg_enabled">
            <input type="checkbox" id="cfg_enabled"> 启用看门狗
        </label>
    </div>

    <div class="form-group">
        <label for="cfg_check_interval">检查间隔（秒）</label>
        <input type="number" id="cfg_check_interval" class="form-control" min="1" value="10">
    </div>

    <div class="form-group">
        <label class="check-label" for="cfg_auto_restart">
            <input type="checkbox" id="cfg_auto_restart"> 进程停止时自动重启
        </label>
    </div>

    <div class="form-group">
        <label for="cfg_max_restarts">最大重启次数</label>
        <input type="number" id="cfg_max_restarts" class="form-control" min="0" value="5">
    </div>

    <div class="form-group">
        <label for="cfg_restart_cooldown">重启冷却时间（秒）</label>
        <input type="number" id="cfg_restart_cooldown" class="form-control" min="0" value="30">
    </div>

    <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
</div>

<div class="card">
    <h3>运行状态</h3>
    <div id="statusArea" class="status-area" role="status" aria-live="polite">
        <div class="loading-text">加载中...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/watchdog.js"></script>
{% endblock %}
