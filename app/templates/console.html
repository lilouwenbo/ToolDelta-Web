{% extends "base.html" %}
{% set active_page = "console" %}
{% block content %}
<div class="page-header">
    <h1>控制台</h1>
    <div>
        <button class="btn" id="consoleToggleBtn" onclick="toggleTool()">检测中...</button>
        <button class="btn btn-outline" onclick="clearConsole()">清屏</button>
    </div>
</div>

<div class="console-wrap">
    <div class="console-bar">
        <span id="consoleStatus">未连接</span>
    </div>
    <div class="console-body" id="consoleBody"></div>
    <div class="console-foot">
        <input id="consoleInput" placeholder="输入命令..." autocomplete="off">
    </div>
</div>

<style>
.console-wrap { background:#000; border:1px solid var(--hairline); border-radius:var(--r-lg); overflow:hidden; }
.console-bar { display:flex; align-items:center; padding:8px 14px; background:var(--surface-1); border-bottom:1px solid var(--hairline); font-size:12px; color:var(--ink-muted); }
.console-body { height:440px; overflow-y:scroll; overflow-x:auto; padding:8px 12px; font-family:Consolas,'Microsoft YaHei',monospace; font-size:13px; line-height:1.5; white-space:pre; }
.console-foot { display:flex; border-top:1px solid var(--hairline); background:var(--canvas); }
.console-foot input { flex:1; padding:10px 14px; border:none; background:transparent; color:var(--ink); font-size:13px; font-family:inherit; outline:none; }
</style>
{% endblock %}

{% block scripts %}
<script src="/static/js/console.js"></script>
{% endblock %}
