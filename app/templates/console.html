{% extends "base.html" %}
{% set active_page = "console" %}
{% block content %}
<div class="page-header">
    <h1>控制台</h1>
    <div>
        <button class="btn" id="consoleToggleBtn" onclick="toggleTool()">检测中...</button>
        <button class="btn btn-outline" onclick="clearConsole()">清屏</button>
    </div>
</div>

<div class="console-wrap">
    <div class="console-bar">
        <span id="consoleStatus">未连接</span>
    </div>
    <div class="fav-strip" id="favStrip"></div>
    <div class="console-body" id="consoleBody"></div>
    <div class="console-foot">
        <input id="consoleInput" placeholder="输入命令...（↑/↓ 翻历史，Tab 补全）" autocomplete="off">
    </div>
</div>

<style>
.console-wrap { background:var(--console-bg); border:1px solid var(--hairline); border-radius:var(--r-lg); overflow:hidden; }
.console-bar { display:flex; align-items:center; padding:8px 14px; background:var(--console-bar); border-bottom:1px solid var(--hairline); font-size:12px; color:var(--console-fg); }
.fav-strip { display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px; background:var(--console-bar); border-bottom:1px solid var(--hairline); min-height:34px; align-items:center; }
.fav-empty { font-size:12px; color:var(--ink-tertiary); }
.fav-chip { cursor:pointer; border:1px solid var(--hairline); background:var(--surface-1); color:var(--ink); border-radius:var(--r-sm); padding:3px 10px; font-size:12px; font-family:inherit; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fav-chip:hover { border-color:var(--primary); color:var(--primary); }
.console-body { height:440px; overflow-y:scroll; overflow-x:auto; padding:8px 12px; font-family:Consolas,'Microsoft YaHei',monospace; font-size:13px; line-height:1.5; white-space:pre; background:var(--console-bg); color:var(--console-fg); }
.console-foot { display:flex; border-top:1px solid var(--hairline); background:var(--console-foot); }
.console-foot input { flex:1; padding:10px 14px; border:none; background:transparent; color:var(--console-fg); font-size:13px; font-family:inherit; outline:none; }
</style>
{% endblock %}

{% block scripts %}
<script src="/static/js/console.js"></script>
{% endblock %}
