{% extends "base.html" %}
{% set active_page = "console" %}
{% block content %}
<div class="page-header">
    <h1>控制台</h1>
    <div>
        <button class="btn btn-outline" id="consoleToggleBtn" onclick="toggleTool()" aria-label="启动或停止 ToolDelta">检测中...</button>
        <button class="btn btn-outline" onclick="clearConsole()" aria-label="清空控制台输出">清屏</button>
    </div>
</div>

<div class="console-wrap">
    <div class="console-bar">
        <span id="consoleStatus" role="status" aria-live="polite">🔴 未连接</span>
    </div>
    <div class="fav-strip" id="favStrip" aria-label="常用命令"></div>
    <div class="console-body" id="consoleBody" role="log" aria-live="polite" aria-label="控制台输出" tabindex="0"></div>
    <div class="console-foot">
        <input id="consoleInput" placeholder="输入命令...（↑/↓ 翻历史，Tab 补全）" autocomplete="off" aria-label="命令输入">
        <button class="console-send-btn" onclick="sendConsoleInput()" aria-label="发送命令">发送</button>
    </div>
</div>

<style>
.console-wrap {
  background: linear-gradient(180deg, var(--console-bg), #050608 60%, #000);
  border: 1px solid var(--hairline);
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 0 80px rgba(0,0,0,0.55);
}
.console-bar {
  display:flex; align-items:center; gap:8px;
  padding:10px 16px;
  background: rgba(255,255,255,0.03);
  border-bottom:1px solid var(--hairline);
  font-size:12px; color:var(--console-fg);
}
.console-bar::before {
  content:''; width:9px; height:9px; border-radius:50%;
  background:var(--success); box-shadow:0 0 8px var(--success);
}
.fav-strip { display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--hairline); min-height:34px; align-items:center; }
.fav-empty { font-size:12px; color:var(--ink-tertiary); }
.fav-chip {
  cursor:pointer; border:1px solid var(--hairline); background:var(--surface-1); color:var(--ink);
  border-radius:var(--r-sm); padding:3px 10px; font-size:12px; font-family:inherit;
  max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  transition: all .15s var(--ease);
}
.fav-chip:hover { border-color:var(--primary); color:var(--ink); background:rgba(94,106,210,0.15); box-shadow:0 0 0 3px rgba(94,106,210,0.12); }
.console-body {
  height:440px; overflow-y:scroll; overflow-x:auto; padding:10px 14px;
  font-family:'Cascadia Code','Fira Code',Consolas,'Microsoft YaHei',monospace;
  font-size:13px; line-height:1.55; white-space:pre-wrap; word-break:break-word;
  color:var(--console-fg);
  background:
    radial-gradient(120% 60% at 50% 0%, rgba(94,106,210,0.05), transparent 60%),
    #050608;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
  scrollbar-width: thin; scrollbar-color: var(--hairline-strong) transparent;
}
.console-body > div { padding:1px 4px; border-radius:4px; transition: background .12s; }
.console-body > div:hover { background: rgba(255,255,255,0.04); }
.console-foot {
  display:flex; align-items:center; gap:8px;
  border-top:1px solid var(--hairline);
  background: rgba(255,255,255,0.02);
  padding-left:14px;
  transition: box-shadow .18s var(--ease);
}
.console-foot::before { content:'❯'; color:var(--primary-hover); font-weight:700; font-size:14px; transition: color .18s; }
.console-foot:focus-within { box-shadow: inset 0 0 0 1px rgba(94,106,210,0.4); }
.console-foot:focus-within::before { color: var(--primary); }
.console-foot input {
  flex:1; padding:12px 14px 12px 6px; border:none; background:transparent;
  color:var(--console-fg); font-size:13px; font-family:inherit; outline:none;
}
.console-foot input::placeholder { color: var(--ink-tertiary); }
.console-send-btn {
  padding: 12px 16px; border: none; cursor: pointer;
  background: var(--primary); color: var(--ink);
  font-size: 14px; font-weight: 500;
  transition: background .15s;
}
.console-send-btn:hover { background: var(--primary-hover); }
.console-send-btn:active { background: var(--primary); }
</style>
{% endblock %}

{% block scripts %}
<script src="/static/js/console.js"></script>
{% endblock %}
