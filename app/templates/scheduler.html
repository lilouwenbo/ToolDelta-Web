{% extends "base.html" %}
{% set active_page = "scheduler" %}
{% block content %}
<div class="page-header">
    <h1>定时任务</h1>
    <div>
        <button class="btn btn-primary" onclick="openAdd()">添加任务</button>
    </div>
</div>

<div class="card">
    <p style="font-size:13px;color:var(--ink-subtle);margin-bottom:14px">
        按计划向 ToolDelta 控制台自动发送命令（如定时重启、定时备份）。默认新任务处于关闭状态，启用后才会按计划执行。
    </p>
    <div style="overflow-x:auto">
        <table id="jobsTable">
            <thead>
                <tr>
                    <th>名称</th>
                    <th>类型</th>
                    <th>命令</th>
                    <th>启用</th>
                    <th>运行次数</th>
                    <th>上次运行</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="jobsBody">
                <tr><td colspan="7" style="text-align:center;color:var(--ink-subtle)">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 添加 / 编辑 表单弹窗 -->
<div class="modal-overlay" id="jobModal">
    <div class="modal" style="max-width:520px">
        <h2 id="jobModalTitle">添加任务</h2>

        <input type="hidden" id="job_id">

        <div class="form-group" style="margin-bottom:12px">
            <label style="display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--ink-muted)">名称</label>
            <input type="text" id="job_name" placeholder="例如：每日备份" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--canvas);color:var(--ink);font-size:14px;outline:none;box-sizing:border-box">
        </div>

        <div class="form-group" style="margin-bottom:12px">
            <label style="display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--ink-muted)">类型</label>
            <select id="job_type" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--canvas);color:var(--ink);font-size:14px;outline:none;box-sizing:border-box">
                <option value="interval">间隔执行（每 N 秒）</option>
                <option value="daily">每日定点（HH:MM）</option>
            </select>
        </div>

        <div class="form-group" id="row_interval" style="margin-bottom:12px">
            <label style="display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--ink-muted)">间隔（秒）</label>
            <input type="number" id="job_interval" min="1" value="3600" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--canvas);color:var(--ink);font-size:14px;outline:none;box-sizing:border-box">
        </div>

        <div id="row_daily" style="display:none;margin-bottom:12px">
            <div style="display:flex;gap:10px">
                <div class="form-group" style="flex:1">
                    <label style="display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--ink-muted)">小时（0-23）</label>
                    <input type="number" id="job_hour" min="0" max="23" value="4" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--canvas);color:var(--ink);font-size:14px;outline:none;box-sizing:border-box">
                </div>
                <div class="form-group" style="flex:1">
                    <label style="display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--ink-muted)">分钟（0-59）</label>
                    <input type="number" id="job_minute" min="0" max="59" value="0" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--canvas);color:var(--ink);font-size:14px;outline:none;box-sizing:border-box">
                </div>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:12px">
            <label style="display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--ink-muted)">命令</label>
            <input type="text" id="job_command" placeholder="例如：restart 或 backup" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--canvas);color:var(--ink);font-size:14px;outline:none;box-sizing:border-box">
        </div>

        <div class="form-group" style="margin-bottom:8px">
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
                <input type="checkbox" id="job_enabled" style="accent-color:var(--primary)"> 启用该任务
            </label>
        </div>

        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeJobModal()">取消</button>
            <button class="btn btn-primary" id="jobSaveBtn" onclick="submitJob()">保存</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/scheduler.js"></script>
{% endblock %}
