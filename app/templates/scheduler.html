{% extends "base.html" %}
{% set active_page = "scheduler" %}
{% block content %}
<div class="page-header">
    <h1>定时任务</h1>
    <div>
        <button class="btn btn-primary" onclick="openAdd()">添加任务</button>
    </div>
</div>

<div class="card">
    <p class="help-text">
        按计划向 ToolDelta 控制台自动发送命令（如定时重启、定时备份）。默认新任务处于关闭状态，启用后才会按计划执行。
    </p>
    <div class="table-wrap">
        <table id="jobsTable" class="table">
            <thead>
                <tr>
                    <th>名称</th>
                    <th>类型</th>
                    <th>命令</th>
                    <th>启用</th>
                    <th>运行次数</th>
                    <th>上次运行</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="jobsBody">
                <tr><td colspan="7" class="table-loading">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 添加 / 编辑 表单弹窗 -->
<div class="modal-overlay" id="jobModal" role="dialog" aria-modal="true" aria-labelledby="jobModalTitle">
    <div class="modal modal-md">
        <h2 id="jobModalTitle">添加任务</h2>

        <input type="hidden" id="job_id">

        <div class="form-group">
            <label for="job_name">名称</label>
            <input type="text" id="job_name" class="form-control" placeholder="例如：每日备份">
        </div>

        <div class="form-group">
            <label for="job_type">类型</label>
            <select id="job_type" class="form-control">
                <option value="interval">间隔执行（每 N 秒）</option>
                <option value="daily">每日定点（HH:MM）</option>
            </select>
        </div>

        <div class="form-group" id="row_interval">
            <label for="job_interval">间隔（秒）</label>
            <input type="number" id="job_interval" class="form-control" min="1" value="3600">
        </div>

        <div id="row_daily" style="display:none">
            <div class="form-row">
                <div class="form-group">
                    <label for="job_hour">小时（0-23）</label>
                    <input type="number" id="job_hour" class="form-control" min="0" max="23" value="4">
                </div>
                <div class="form-group">
                    <label for="job_minute">分钟（0-59）</label>
                    <input type="number" id="job_minute" class="form-control" min="0" max="59" value="0">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="job_command">命令</label>
            <input type="text" id="job_command" class="form-control" placeholder="例如：restart 或 backup">
        </div>

        <div class="form-group" style="margin-bottom:8px">
            <label class="check-label" for="job_enabled">
                <input type="checkbox" id="job_enabled"> 启用该任务
            </label>
        </div>

        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeJobModal()">取消</button>
            <button class="btn btn-primary" id="jobSaveBtn" onclick="submitJob()">保存</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/scheduler.js"></script>
{% endblock %}
