{% extends "base.html" %}
{% set active_page = "backup" %}
{% block content %}
<div class="page-header">
    <h1>备份与恢复</h1>
    <div>
        <button class="btn btn-primary" id="btnCreate" onclick="createBackup()">创建备份</button>
        <button class="btn btn-danger" onclick="showFactoryReset()">恢复出厂设置</button>
    </div>
</div>

<div class="card">
    <h2>说明</h2>
    <p class="notice">备份将保存 插件文件、插件配置文件、插件数据文件和 ToolDelta 基本配置。恢复出厂设置将清空所有插件、配置和数据。</p>
</div>

<div id="backupList"></div>
{% endblock %}

{% block scripts %}
<script>
function _esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
}

function loadBackups() {
    fetch('/api/backups')
        .then(function(r) { return r.json(); })
        .then(function(backups) {
            var container = document.getElementById('backupList');
            if (!backups || backups.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon" aria-hidden="true">💾</div>暂无备份，点击「创建备份」生成第一份。</div>';
                return;
            }
            // 名称、zip 均转义；onclick 用 JSON.stringify + _esc 双重保险，防止引号闭合
            container.innerHTML = backups.map(function(b) {
                var zipAttr = _esc(JSON.stringify(b.zip));
                return '<div class="backup-item">' +
                    '<div><strong>' + _esc(b.name) + '</strong>' +
                    '<div class="backup-meta">' + _esc(b.time) + ' | ' + (b.size / 1024).toFixed(1) + ' KB</div></div>' +
                    '<div class="backup-actions">' +
                    '<button class="btn btn-sm btn-primary" onclick="restoreBackup(' + zipAttr + ')">还原</button>' +
                    '<button class="btn btn-sm btn-danger" onclick="deleteBackup(' + zipAttr + ')">删除</button></div></div>';
            }).join('');
        })
        .catch(function() { showToast('加载备份列表失败', 'error'); });
}

function createBackup() {
    // 使用项目自定义 prompt 弹窗（替代浏览器原生 prompt，移动端体验更一致）
    showPrompt('备份名称（可选）：', '例如：daily-backup', '', function(name) {
        if (name === null) return; // 用户取消
        var btn = document.getElementById('btnCreate');
        if (btn) { btn.disabled = true; btn.textContent = '备份中...'; }
        fetch('/api/backup/create', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name: name || undefined}) })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.success) { showToast('备份创建成功: ' + d.name, 'success'); loadBackups(); }
                else { showToast('备份创建失败: ' + (d.error || '未知错误'), 'error'); }
            })
            .catch(function() { showToast('备份创建失败', 'error'); })
            .finally(function() { if (btn) { btn.disabled = false; btn.textContent = '创建备份'; } });
    });
}

function restoreBackup(zip) {
    showConfirm('确定还原此备份？当前数据将被覆盖。建议先创建备份。', function(ok) {
        if (!ok) return;
        fetch('/api/backup/restore', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({zip: zip}) })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                showToast(d.success ? '还原成功' : '还原失败: ' + (d.message || d.error || ''), d.success ? 'success' : 'error');
                if (d.success) loadBackups(); // 还原成功后刷新列表
            })
            .catch(function() { showToast('还原请求失败', 'error'); });
    }, true);
}

function deleteBackup(zip) {
    showConfirm('确定删除此备份？', function(ok) {
        if (!ok) return;
        fetch('/api/backup/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({zip: zip}) })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.success) { showToast('已删除', 'info'); loadBackups(); }
                else { showToast('删除失败: ' + (d.error || ''), 'error'); }
            })
            .catch(function() { showToast('删除请求失败', 'error'); });
    });
}

function showFactoryReset() {
    showConfirm('确定恢复出厂设置？这将清空所有插件、配置和数据！建议先创建备份。', function(ok) {
        if (!ok) return;
        showConfirm('再次确认：此操作不可撤销！', function(ok2) {
            if (!ok2) return;
            fetch('/api/reset', { method:'POST' })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.success) { showToast('已恢复出厂设置', 'success'); loadBackups(); }
                    else { showToast('恢复出厂设置失败: ' + (d.error || ''), 'error'); }
                })
                .catch(function() { showToast('恢复出厂设置失败', 'error'); });
        }, true);
    });
}

loadBackups();
</script>
{% endblock %}
