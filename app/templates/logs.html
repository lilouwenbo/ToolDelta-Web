{% extends "base.html" %}
{% set active_page = "logs" %}
{% block content %}
<div class="page-header">
    <h1>日志</h1>
    <div>
        <button class="btn btn-primary" onclick="loadLogs()">搜索</button>
        <button class="btn btn-outline" onclick="refreshLogs()">刷新</button>
        <button class="btn btn-outline" onclick="doExport()">导出</button>
        <button class="btn btn-outline" onclick="clearDisplay()">清屏</button>
    </div>
</div>

<div class="search-bar">
    <select id="logLevel" aria-label="按级别筛选">
        <option value="">全部级别</option>
        <option value="INFO">INFO</option>
        <option value="WARN">WARN</option>
        <option value="ERROR">ERROR</option>
    </select>
    <select id="logSource" aria-label="按来源筛选"><option value="">全部来源</option></select>
    <input type="text" id="logFilter" placeholder="关键字过滤..." oninput="filterLogs()" inputmode="search" aria-label="关键字过滤">
    <select id="logDate" onchange="loadLogs()" aria-label="选择日期">
        <option value="today">今天</option>
    </select>
</div>

<div class="console-wrap">
    <div class="console-header">
        <span id="logStatus">日志</span>
        <span id="logCount">0 行</span>
    </div>
    <div class="console-body log-body" id="logBody" style="height:600px"></div>
</div>
<style>
/* 移动端日志高度：覆盖内联 600px（内联 style 优先级最高，需 !important） */
@media (max-width: 768px) {
    .log-body { height: 55vh !important; max-height: 65vh; font-size: 11px; }
}
@media (max-width: 400px) {
    .log-body { height: 45vh !important; }
}
/* 日志搜索栏移动端堆叠 */
@media (max-width: 768px) {
    .logs-search-bar { flex-direction: column; }
}
</style>
{% endblock %}

{% block scripts %}
<script src="/static/js/logs.js"></script>
{% endblock %}
